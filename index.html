<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunch Club BCN — Webfleet</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--red:#ED1C24;--rd:#c0151b;--bk:#000;--gl:#ccc;--gm:#999;--gd:#333;--gbg:#f5f5f5;--gb:#e0e0e0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--gbg);color:var(--bk)}
header{background:var(--bk);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:1000}
.logo{display:flex;align-items:center;gap:12px}
.lmark{width:32px;height:32px;background:var(--red);border-radius:2px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px}
.ltxt{color:#fff;font-size:15px;font-weight:700}
.lsub{color:var(--gm);font-size:13px;font-weight:400;margin-left:4px}
.hbadge{background:var(--red);color:#fff;font-size:11px;padding:3px 10px;border-radius:2px;font-weight:700;letter-spacing:.05em}
main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.hero{margin-bottom:1.5rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.hero h1{font-size:28px;font-weight:700;line-height:1.2}
.hero h1 span{color:var(--red)}
.hero p{color:var(--gd);font-size:14px;margin-top:6px}
.next-box{background:#fff;border:1px solid var(--gb);padding:.75rem 1.25rem;min-width:220px}
.next-box .nlbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gm);font-weight:700;margin-bottom:6px}
.next-row{display:flex;align-items:center;gap:8px}
.next-row input{flex:1;padding:6px 8px;border:1px solid var(--gb);font-size:14px;font-weight:700;font-family:Arial,sans-serif;color:var(--bk);min-width:0}
.next-row input:focus{outline:2px solid var(--red)}
.next-row button{background:var(--red);color:#fff;border:none;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:2rem}
.stat{background:#fff;border:1px solid var(--gb);padding:1.25rem 1.5rem}
.stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gm);font-weight:700;margin-bottom:6px}
.stat .val{font-size:24px;font-weight:700;line-height:1}
.stat .val.sm{font-size:16px;line-height:1.3}
.stat .val.red{color:var(--red)}
.stat .sub{font-size:12px;color:var(--gm);margin-top:4px}
.tabs{display:flex;border-bottom:2px solid var(--gb);margin-bottom:1.5rem;flex-wrap:wrap}
.tbtn{padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;background:none;border:none;color:var(--gm);text-transform:uppercase;letter-spacing:.03em;border-bottom:3px solid transparent;margin-bottom:-2px}
.tbtn:hover{color:var(--bk)}
.tbtn.on{color:var(--red);border-bottom-color:var(--red)}
.panel{display:none}.panel.on{display:block}
.lb-list{display:flex;flex-direction:column;gap:12px}
.lbc{background:#fff;border:1px solid var(--gb);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1.25rem}
.lbc.top{border-left:4px solid var(--red)}
.lbrank{font-size:28px;font-weight:700;width:40px;text-align:center;flex-shrink:0}
.lbi{flex:1}
.lbname{font-size:18px;font-weight:700}
.lbmeta{font-size:12px;color:var(--gm);margin-top:2px}
.lbbars{margin-top:10px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.bi .bl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--gm);font-weight:700;margin-bottom:3px;display:flex;justify-content:space-between}
.bt{height:4px;background:var(--gl)}.bf{height:4px;background:var(--red)}
.lbsb{text-align:right;flex-shrink:0}
.lbsc{font-size:40px;font-weight:700;line-height:1}
.lbsl{font-size:11px;color:var(--gm);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.vchip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;background:#f0f0f0;color:var(--gd);margin:2px;border:1px solid var(--gb)}
.rsel{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.rbtn{padding:7px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;background:#fff;border:1px solid var(--gb);color:var(--gd)}
.rbtn.on{background:var(--red);color:#fff;border-color:var(--red)}
.sw{background:#fff;border:1px solid var(--gb);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bk);color:#fff;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
thead th:not(:first-child){text-align:center}
tbody td{padding:10px 14px;border-bottom:1px solid var(--gb);color:var(--bk)}
tbody td:not(:first-child){text-align:center}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafafa}
.nc{font-weight:700}
.ap{display:inline-block;padding:3px 10px;font-weight:700;font-size:12px}
.ah{background:#1a1a1a;color:#fff}.am{background:var(--gd);color:#fff}.al{background:var(--gl);color:var(--bk)}
tfoot td{background:var(--gbg);font-weight:700;font-size:12px;padding:10px 14px;border-top:2px solid var(--bk)}
tfoot td:not(:first-child){text-align:center;color:var(--red)}
#map{height:400px;border:1px solid var(--gb);margin-bottom:1rem}
.mleg{background:#fff;border:1px solid var(--gb);padding:1rem 1.5rem}
.mleg h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--gm);font-weight:700;margin-bottom:10px}
.legrow{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.legdot{width:12px;height:12px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:2px}
.legname{font-size:13px;font-weight:700}
.legaddr{font-size:11px;color:var(--gm)}
.legscore{font-size:13px;font-weight:700;color:var(--red);margin-left:auto;white-space:nowrap}
.fc{background:#fff;border:1px solid var(--gb);padding:1.5rem;margin-bottom:1rem}
.fh{font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:var(--gm);margin-bottom:1rem;border-bottom:1px solid var(--gb);padding-bottom:.5rem}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.fgrp{display:flex;flex-direction:column;gap:4px}
.fgrp label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;color:var(--gd)}
.fgrp input{padding:8px 10px;border:1px solid var(--gb);font-size:13px;font-family:Arial,sans-serif;color:var(--bk);background:#fff}
.fgrp input:focus{outline:2px solid var(--red)}
.sbtn{background:var(--red);color:#fff;border:none;padding:11px 28px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;margin-top:1rem}
.sbtn:hover{background:var(--rd)}
.hint{font-size:11px;color:var(--gm);margin-top:8px;line-height:1.5}
.name-entry{display:flex;gap:8px;align-items:center;margin-bottom:1rem;padding:1rem 1.25rem;background:#fff;border:1px solid var(--gb)}
.name-entry input{flex:1;padding:9px 12px;border:1px solid var(--gb);font-size:14px;font-family:Arial,sans-serif;color:var(--bk)}
.name-entry input:focus{outline:2px solid var(--red)}
.name-entry button{background:var(--red);color:#fff;border:none;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.rpick{padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;border:1px solid var(--gb);color:var(--gd)}
.rpick.on{background:var(--bk);color:#fff;border-color:var(--bk)}
.vtag{display:inline-block;background:#1D9E75;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:2px;margin-left:6px}
.vrow{display:grid;grid-template-columns:100px 1fr 1fr 1fr 1fr;gap:8px;align-items:center;margin-bottom:8px}
.vrow .pn{font-size:13px;font-weight:700}
.vrow input{padding:7px 8px;border:1px solid var(--gb);font-size:14px;font-weight:700;text-align:center;font-family:Arial,sans-serif;width:100%;color:var(--bk)}
.vrow input:focus{outline:2px solid var(--red)}
.vch{display:grid;grid-template-columns:100px 1fr 1fr 1fr 1fr;gap:8px;margin-bottom:6px}
.vch span{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:var(--gm);text-align:center}
.vch span:first-child{text-align:left}
footer{text-align:center;padding:2rem;font-size:11px;color:var(--gm);border-top:1px solid var(--gb);margin-top:2rem;background:#fff}
footer strong{color:var(--red)}
@media(max-width:620px){.fg{grid-template-columns:1fr}.lbbars{grid-template-columns:1fr 1fr}.lbsc{font-size:28px}.hero{flex-direction:column}.next-box{width:100%}}
</style>
</head>

<script>
const SEED=[
  {id:'sopa',name:'Sopa',date:'Junio 2026',org:'Aru',
   address:'Carrer de Boronat, 1, 08018 Barcelona',lat:41.4033,lng:2.1932,

   address:'Calle de Sancho de Ávila, 175, 08018 Barcelona',lat:41.4011,lng:2.1935,
   scores:[
    {name:'Marc',p:7.5,c:5.5,v:7.0,s:8.5},{name:'Bernat',p:7.0,c:6.0,v:6.0,s:8.0},
    {name:'Aru',p:7.0,c:6.0,v:7.0,s:8.0},{name:'Agus',p:7.0,c:5.0,v:6.0,s:8.0},
    {name:'Daniel',p:7.0,c:5.0,v:7.0,s:8.5},{name:'Kata',p:7.0,c:8.0,v:7.0,s:8.0},
    {name:'Clara',p:7.0,c:8.0,v:9.0,s:9.0},{name:'Laia',p:7.0,c:5.0,v:7.0,s:8.0},
    {name:'Bella',p:7.5,c:5.0,v:7.0,s:8.0}]}
];

function load(){try{const s=localStorage.getItem('lc3');return s?JSON.parse(s):{restaurants:JSON.parse(JSON.stringify(SEED)),next:''}}catch(e){return{restaurants:JSON.parse(JSON.stringify(SEED)),next:''}}}
function save(){try{localStorage.setItem('lc3',JSON.stringify(state));}catch(e){}}

const avg=s=>(s.p+s.c+s.v+s.s)/4;
const ravg=r=>r.scores.length?r.scores.reduce((a,s)=>a+avg(s),0)/r.scores.length:0;
const cavg=(r,k)=>r.scores.length?r.scores.reduce((a,s)=>a+s[k],0)/r.scores.length:0;
const fmt=n=>parseFloat(n.toFixed(1));
const CATS=[{k:'p',l:'Precio'},{k:'c',l:'Comida'},{k:'v',l:'Vibes'},{k:'s',l:'Servicio'}];

let state=load(), mapInst=null, curRest=0, curVoteRest=0;

function initNext(){
  document.getElementById('next-input').value=state.next||'';
}
function saveNext(){
  state.next=document.getElementById('next-input').value.trim();
  save();renderStats();
  const el=document.getElementById('next-saved');
  el.style.display='block';setTimeout(()=>el.style.display='none',2000);
}

function renderStats(){
  const data=state.restaurants;
  const sorted=[...data].sort((a,b)=>ravg(b)-ravg(a));
  const best=sorted[0];
  const people=[...new Set(data.flatMap(r=>r.scores.map(s=>s.name)))];
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="lbl">Mejor restaurante</div><div class="val red sm">${best.name}</div><div class="sub">${fmt(ravg(best))} / 10</div></div>
    <div class="stat"><div class="lbl">Visitas 2026</div><div class="val">${data.length}</div><div class="sub">restaurantes</div></div>
    <div class="stat"><div class="lbl">Participantes totales</div><div class="val">${people.length}</div><div class="sub">personas del equipo</div></div>
    <div class="stat"><div class="lbl">Próximo organizador</div><div class="val red sm">${state.next||'—'}</div><div class="sub">editar arriba</div></div>`;
}

function renderLB(){
  const data=state.restaurants;
  const sorted=[...data].map(r=>({...r,avg:ravg(r)})).sort((a,b)=>b.avg-a.avg);
  const medals=['🥇','🥈','🥉'];
  document.getElementById('panel-lb').innerHTML=`<div class="lb-list">${sorted.map((r,i)=>`
    <div class="lbc ${i===0?'top':''}">
      <div class="lbrank">${medals[i]||i+1}</div>
      <div class="lbi">
        <div class="lbname">${r.name}</div>
        <div class="lbmeta">${r.date} · Org: ${r.org} · ${r.scores.length} votos</div>
        <div style="margin-top:5px">${r.scores.map(s=>`<span class="vchip">${s.name}</span>`).join('')}</div>
        <div class="lbbars">${CATS.map(c=>{const v=cavg(r,c.k);return`<div class="bi"><div class="bl"><span>${c.l}</span><span>${fmt(v)}</span></div><div class="bt"><div class="bf" style="width:${v/10*100}%"></div></div></div>`;}).join('')}</div>
      </div>
      <div class="lbsb"><div class="lbsc">${fmt(r.avg)}</div><div class="lbsl">/ 10</div></div>
    </div>`).join('')}</div>`;
}

function renderScores(){
  const data=state.restaurants;
  const r=data[curRest];
  const rows=[...r.scores].map(s=>({...s,avg:avg(s)})).sort((a,b)=>b.avg-a.avg);
  const pc=v=>v>=8.5?'ah':v>=7?'am':'al';
  document.getElementById('panel-scores').innerHTML=`
    <div class="rsel">${data.map((d,i)=>`<button class="rbtn ${i===curRest?'on':''}" onclick="switchRest(${i})">${d.name}</button>`).join('')}</div>
    <div class="sw"><table>
      <thead><tr><th>Persona</th>${CATS.map(c=>`<th>${c.l}</th>`).join('')}<th>Media</th></tr></thead>
      <tbody>${rows.map(s=>`<tr><td class="nc">${s.name}</td>${CATS.map(c=>`<td>${fmt(s[c.k])}</td>`).join('')}<td><span class="ap ${pc(s.avg)}">${fmt(s.avg)}</span></td></tr>`).join('')}</tbody>
      <tfoot><tr><td>Media grupo</td>${CATS.map(c=>`<td>${fmt(cavg(r,c.k))}</td>`).join('')}<td>${fmt(ravg(r))}</td></tr></tfoot>
    </table></div>`;
}

function switchRest(i){curRest=i;renderScores();}

function renderVote(){
  const data=state.restaurants;
  document.getElementById('panel-vote').innerHTML=`

    <div class="name-entry">
      <input id="vname" placeholder="Tu nombre (ej. Kata, Bernat...)" />
      <button onclick="startVote()">Continuar</button>
    </div>
    <div id="vform" style="display:none">
      <div class="fc">
        <div class="fh" id="vftitle"></div>
        <div class="vch"><span></span><span>Precio</span><span>Comida</span><span>Vibes</span><span>Servicio</span></div>
        <div class="vrow">
          <div class="pn" id="vfname"></div>
          <input type="number" id="vp" min="0" max="10" step="0.5" placeholder="—">
          <input type="number" id="vc" min="0" max="10" step="0.5" placeholder="—">
          <input type="number" id="vv" min="0" max="10" step="0.5" placeholder="—">
          <input type="number" id="vs" min="0" max="10" step="0.5" placeholder="—">
        </div>
        <button class="sbtn" onclick="submitVote()">Guardar voto</button>
        <p class="hint">Escribe entre 0 y 10, puedes usar decimales (ej. 7.5). Si votas de nuevo con el mismo nombre, actualiza tu voto anterior.</p>
      </div>
    </div>
    <div id="vthanks" style="display:none;padding:1rem 1.25rem;background:#fff;border:1px solid var(--gb);font-size:14px;margin-bottom:1rem">
      <span style="color:#1D9E75;font-weight:700;font-size:16px">Voto guardado!</span><br>
      <span style="color:var(--gm);font-size:13px">El leaderboard se ha actualizado. Puedes ver los resultados en la pestaña Leaderboard.</span>
    </div>
    <div style="padding:1rem 1.25rem;background:#fff;border:1px solid var(--gb)">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gm);margin-bottom:.5rem">Han votado para <span id="vrest-name"></span></div>
      <div id="voted-list"></div>
    </div>`;
  refreshVotedList();
}

function refreshVotedList(){
  const r=state.restaurants[curVoteRest];
  document.getElementById('vrest-name').textContent=r.name;
  document.getElementById('voted-list').innerHTML=r.scores.length
    ?r.scores.map(s=>`<span class="vchip">${s.name}</span>`).join('')
    :`<span style="font-size:13px;color:var(--gm)">Nadie ha votado aún — sé el primero!</span>`;
}

function pickVR(i){curVoteRest=i;renderVote();}

function startVote(){
  const n=document.getElementById('vname').value.trim();
  if(!n){document.getElementById('vname').focus();return;}
  const r=state.restaurants[curVoteRest];
  const ex=r.scores.find(s=>s.name.toLowerCase()===n.toLowerCase());
  document.getElementById('vftitle').innerHTML=`Votando: <strong>${r.name}</strong> · ${r.date}${ex?'<span class="vtag">actualizando voto</span>':''}`;
  document.getElementById('vfname').textContent=n;
  if(ex){document.getElementById('vp').value=ex.p;document.getElementById('vc').value=ex.c;document.getElementById('vv').value=ex.v;document.getElementById('vs').value=ex.s;}
  else{['vp','vc','vv','vs'].forEach(id=>document.getElementById(id).value='');}
  document.getElementById('vform').style.display='block';
  document.getElementById('vthanks').style.display='none';
}

function submitVote(){
  const n=document.getElementById('vname').value.trim();
  if(!n)return;
  const vals=['vp','vc','vv','vs'].map(id=>parseFloat(document.getElementById(id).value));
  if(vals.some(x=>isNaN(x))){alert('Por favor rellena las 4 puntuaciones');return;}
  const r=state.restaurants[curVoteRest];
  r.scores=r.scores.filter(x=>x.name.toLowerCase()!==n.toLowerCase());
  r.scores.push({name:n,p:vals[0],c:vals[1],v:vals[2],s:vals[3]});
  save();renderStats();renderLB();
  document.getElementById('vform').style.display='none';
  document.getElementById('vthanks').style.display='block';
  refreshVotedList();
}

function renderMap(){
  const data=state.restaurants;
  if(!mapInst){
    mapInst=L.map('map').setView([41.394,2.172],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors',maxZoom:19}).addTo(mapInst);
  } else {mapInst.eachLayer(l=>{if(l instanceof L.Marker)mapInst.removeLayer(l);});}
  data.forEach(r=>{
    const a=fmt(ravg(r));
    const icon=L.divIcon({className:'',html:`<div style="background:#ED1C24;color:#fff;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Arial;font-weight:700;font-size:13px;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">${a}</div>`,iconSize:[40,40],iconAnchor:[20,20]});
    L.marker([r.lat,r.lng],{icon}).addTo(mapInst).bindPopup(`<b style="font-family:Arial">${r.name}</b><br><span style="font-family:Arial;font-size:12px;color:#666">${r.address}</span><br><span style="font-family:Arial;font-size:13px;color:#ED1C24;font-weight:700">Media: ${a}/10</span>`);
  });
  document.getElementById('legrows').innerHTML=data.map(r=>`<div class="legrow"><div class="legdot"></div><div><div class="legname">${r.name}</div><div class="legaddr">${r.address}</div></div><div class="legscore">${fmt(ravg(r))} / 10</div></div>`).join('');
  setTimeout(()=>mapInst.invalidateSize(),200);
}

function renderAdd(){
  document.getElementById('panel-add').innerHTML=`
    <div class="fc">
      <div class="fh">Detalles del nuevo restaurante</div>
      <div class="fg">
        <div class="fgrp"><label>Nombre *</label><input id="fn" placeholder="ej. Bar Cañete"></div>
        <div class="fgrp"><label>Fecha *</label><input id="fd" placeholder="Julio 2026"></div>
        <div class="fgrp"><label>Dirección</label><input id="fa" placeholder="Calle, número, Barcelona"></div>
        <div class="fgrp"><label>Organizador</label><input id="fo" placeholder="Quién lo organizó"></div>
        <div class="fgrp"><label>Latitud (para el mapa)</label><input id="flat" placeholder="41.3851" type="number" step="any"></div>
        <div class="fgrp"><label>Longitud (para el mapa)</label><input id="flng" placeholder="2.1734" type="number" step="any"></div>
      </div>
      <p class="hint">Una vez creado, el equipo puede votar desde la pestaña <strong>Votar</strong>.<br>Para el mapa: busca el restaurante en Google Maps → clic derecho → copia las coordenadas (ej. 41.3892, 2.1687).</p>
      <button class="sbtn" onclick="submitAdd()">Crear restaurante</button>
      <span id="add-ok" style="display:none;margin-left:12px;font-size:13px;color:#1D9E75;font-weight:700">Creado! Ve a la pestaña Votar para añadir puntuaciones.</span>
    </div>`;
}

function submitAdd(){
  const name=document.getElementById('fn').value.trim();
  if(!name){alert('Escribe el nombre del restaurante');return;}
  state.restaurants.push({
    id:name.toLowerCase().replace(/\s+/g,'-'),name,
    date:document.getElementById('fd').value||'2026',
    org:document.getElementById('fo').value,
    address:document.getElementById('fa').value||'Barcelona',
    lat:parseFloat(document.getElementById('flat').value)||41.385,
    lng:parseFloat(document.getElementById('flng').value)||2.173,
    scores:[]
  });
  save();renderStats();renderLB();
  if(mapInst){mapInst.remove();mapInst=null;}
  document.getElementById('add-ok').style.display='inline';
  setTimeout(()=>document.getElementById('add-ok').style.display='none',4000);
  document.getElementById('fn').value='';document.getElementById('fd').value='';
  document.getElementById('fa').value='';document.getElementById('fo').value='';
}

function showTab(t,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('panel-'+t).classList.add('on');
  btn.classList.add('on');
  if(t==='scores')renderScores();
  if(t==='map')renderMap();
  if(t==='add')renderAdd();
  if(t==='vote')renderVote();
}

initNext();renderStats();renderLB();
</script>
</body>
</html>
